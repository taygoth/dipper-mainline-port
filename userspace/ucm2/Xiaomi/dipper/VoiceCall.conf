# Voice Call use case for Xiaomi Mi 8 (dipper).
# Speaker route via QUAT_MI2S_RX -> tas2557 (smart amp).
# Earpiece route via SLIMBUS_0_RX -> WCD934x AIF1 PB -> INT0 -> EAR PA.
# Mic via AIF1_CAP TX7 / DEC7 / AMIC3 (top handset mic).

SectionVerb {
	EnableSequence [
		cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia1' 1"
		cset "name='MultiMedia3 Mixer SLIMBUS_0_TX' 1"

		cset "name='VoiceMMode1 Capture Mixer SLIMBUS_0_TX' 1"

		cset "name='AIF1_CAP Mixer SLIM TX7' 1"
		cset "name='CDC_IF TX7 MUX' DEC7"
	]

	DisableSequence [
		cset "name='VoiceMMode1 Capture Mixer SLIMBUS_0_TX' 0"

		cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia1' 0"
		cset "name='MultiMedia3 Mixer SLIMBUS_0_TX' 0"

		cset "name='AIF1_CAP Mixer SLIM TX7' 0"
		cset "name='CDC_IF TX7 MUX' ZERO"
	]

	Value {
		TQ "Voice"
	}
}

SectionDevice."Earpiece" {
	Comment "Earpiece Output (WCD934x EAR PA)"

	EnableSequence [
		# Bring AIF1 Playback DAI up by routing MM1 stream to SLIMBUS_0_RX
		cset "name='SLIMBUS_0_RX Audio Mixer MultiMedia1' 1"
		# Voice path: VoiceMMode1 stream -> SLIMBUS_0_RX
		cset "name='SLIMBUS_0_RX Voice Mixer VoiceMMode1' 1"
		# WCD934x handset chain: SLIM RX0 -> INT0 interpolator -> DEM -> EAR PA
		cset "name='SLIM RX0 MUX' AIF1_PB"
		cset "name='RX INT0_1 MIX1 INP0' RX0"
		cset "name='RX INT0 DEM MUX' CLSH_DSM_OUT"
		cset "name='EAR PA Volume' 4"
	]

	DisableSequence [
		cset "name='SLIMBUS_0_RX Voice Mixer VoiceMMode1' 0"
		cset "name='SLIMBUS_0_RX Audio Mixer MultiMedia1' 0"
		cset "name='RX INT0 DEM MUX' NORMAL_DSM_OUT"
		cset "name='RX INT0_1 MIX1 INP0' ZERO"
		cset "name='SLIM RX0 MUX' ZERO"
	]

	Value {
		PlaybackPCM "hw:${CardId},0"
		PlaybackPriority 200
	}
}

SectionDevice."Speaker" {
	Comment "Speaker Output (tas2557 via QUAT_MI2S_RX)"

	EnableSequence [
		cset "name='QUAT_MI2S_RX Voice Mixer VoiceMMode1' 1"
	]

	DisableSequence [
		cset "name='QUAT_MI2S_RX Voice Mixer VoiceMMode1' 0"
	]

	Value {
		PlaybackPCM "hw:${CardId},0"
		PlaybackPriority 100
	}
}

SectionDevice."Mic" {
	Comment "Phone Top Mic (AMIC3 via DEC7/TX7)"

	EnableSequence [
		cset "name='ADC MUX7' AMIC"
		cset "name='AMIC MUX7' ADC3"
	]

	DisableSequence [
		cset "name='AMIC MUX7' ZERO"
		cset "name='ADC MUX7' ZERO"
	]

	Value {
		CapturePCM "hw:${CardId},2"
		CaptureMixerElem "ADC3"
		CapturePriority 100
	}
}
